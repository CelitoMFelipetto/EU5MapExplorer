name: eu5mapexplorer

services:
  postgres:
    image: postgres:16
    container_name: eu5-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eu5}
      POSTGRES_USER: ${POSTGRES_USER:-eu5}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eu5_dev_password}
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

